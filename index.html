<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Alexandria — a community-powered lending library. Borrow and lend books with your neighbours within 10–20km."
    />
    <link rel="icon" type="image/svg+xml" href="/favicon.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400;1,700&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+SC:wght@400;600;700&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap"
      rel="stylesheet"
    />
    <title>Alexandria — Your Neighbourhood Library</title>
  </head>
  <body>
    <div id="root"></div>

    <form name="waitlist" netlify hidden>
      <input type="text" name="name" />
      <input type="text" name="postcode" />
      <input type="email" name="email" />
      <input type="checkbox" name="lend" />
      <input type="checkbox" name="borrow" />
      <input type="checkbox" name="buy" />
      <input type="checkbox" name="sell" />
      <button type="submit">Submit</button>
    </form>

    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
